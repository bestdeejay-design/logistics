<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AXIIOM Logistics</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="landing">
  <div class="landing-inner">
    <div class="landing-logo">
      <svg viewBox="0 0 64 64" fill="none" width="72" height="72">
        <rect x="8" y="20" width="48" height="28" rx="4" fill="#f59e0b" opacity="0.9"/>
        <rect x="14" y="28" width="36" height="14" rx="2" fill="#1e293b"/>
        <path d="M20 44v4a2 2 0 002 2h4a2 2 0 002-2v-4" stroke="#f59e0b" stroke-width="2" fill="none"/>
        <path d="M36 44v4a2 2 0 002 2h4a2 2 0 002-2v-4" stroke="#f59e0b" stroke-width="2" fill="none"/>
        <rect x="22" y="10" width="20" height="12" rx="2" fill="#f59e0b" opacity="0.7"/>
        <circle cx="28" cy="48" r="2" fill="#f59e0b"/>
        <circle cx="44" cy="48" r="2" fill="#f59e0b"/>
      </svg>
    </div>
    <h1 class="landing-title">AXIIOM Logistics</h1>
    <p class="landing-tagline">Сборка и доставка заказов</p>
    <div class="landing-cards">
      <div class="landing-card" onclick="App.selectRole('picker')">
        <svg viewBox="0 0 48 48" width="40" height="40">
          <rect x="8" y="12" width="32" height="22" rx="3" fill="#f59e0b" opacity="0.3"/>
          <rect x="12" y="16" width="24" height="14" rx="2" fill="#1e293b"/>
          <path d="M18 30v4a2 2 0 002 2h8a2 2 0 002-2v-4" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
          <path d="M22 8l-4 4h8l-4-4z" fill="#f59e0b"/>
          <circle cx="20" cy="34" r="1.5" fill="#f59e0b"/>
          <circle cx="28" cy="34" r="1.5" fill="#f59e0b"/>
        </svg>
        <span class="landing-card-title">Сборщик</span>
        <span class="landing-card-desc">Сборка заказов на складе</span>
      </div>
      <div class="landing-card" onclick="App.selectRole('courier')">
        <svg viewBox="0 0 48 48" width="40" height="40">
          <rect x="4" y="18" width="34" height="20" rx="4" fill="#f59e0b" opacity="0.3"/>
          <rect x="8" y="22" width="26" height="12" rx="2" fill="#1e293b"/>
          <rect x="30" y="10" width="14" height="22" rx="3" fill="#f59e0b" opacity="0.4"/>
          <path d="M32 14l-4 4h8l-4-4z" fill="#f59e0b"/>
          <circle cx="14" cy="38" r="3" fill="#f59e0b"/>
          <circle cx="36" cy="38" r="3" fill="#f59e0b"/>
          <circle cx="14" cy="38" r="1.5" fill="#1e293b"/>
          <circle cx="36" cy="38" r="1.5" fill="#1e293b"/>
        </svg>
        <span class="landing-card-title">Курьер</span>
        <span class="landing-card-desc">Доставка заказов</span>
      </div>
    </div>
    <button class="landing-btn" onclick="App.openDemo()">Открыть демо</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="phone-frame">
    <div class="status-bar">
      <span class="status-time">12:30</span>
      <span class="status-icons">
        <svg viewBox="0 0 24 14" width="18" height="10">
          <rect x="1" y="1" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <rect x="3" y="3" width="10" height="6" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="20" y="4" width="2" height="4" rx="0.5" fill="currentColor" opacity="0.6"/>
        </svg>
        <svg viewBox="0 0 24 24" width="10" height="10">
          <path d="M12 4C9.5 4 7.5 6 7.5 8.5v3l-2 4h13l-2-4v-3C16.5 6 14.5 4 12 4z" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 18c0 1.1.9 2 2 2s2-.9 2-2" fill="none" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </span>
    </div>

    <div class="role-switcher" id="roleSwitcher">
      <div class="role-tab" data-role="picker" onclick="App.switchRole('picker')">
        <svg viewBox="0 0 24 24" width="14" height="14"><rect x="5" y="7" width="14" height="10" rx="1.5" fill="currentColor" opacity="0.4"/><rect x="7" y="9" width="10" height="6" rx="1" fill="currentColor" opacity="0.6"/><path d="M11 17v2a1 1 0 001 1h0a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
        Сборщик
      </div>
      <div class="role-tab" data-role="courier" onclick="App.switchRole('courier')">
        <svg viewBox="0 0 24 24" width="14" height="14"><rect x="3" y="10" width="15" height="9" rx="2" fill="currentColor" opacity="0.4"/><rect x="13" y="5" width="8" height="12" rx="1.5" fill="currentColor" opacity="0.3"/><path d="M14 8l-2 2h4l-2-2z" fill="currentColor"/></svg>
        Курьер
      </div>
      <div class="role-indicator" id="roleIndicator"></div>
    </div>

    <div class="app-content" id="appContent">
    </div>

    <div class="bottom-nav" id="bottomNav"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="modalOverlay" onclick="App.closeModal()"></div>
<div class="modal" id="modal"></div>

<script src="js/app.js"></script>
</body>
</html>
