<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23f59e0b' d='M21 16.5c0 .38-.21.72-.55.9l-7.45 3.75c-.31.15-.69.15-1 0L5.55 17.4c-.34-.18-.55-.52-.55-.9V6.5c0-.38.21-.72.55-.9l7.45-3.75c.31-.15.69-.15 1 0l7.45 3.75c.34.18.55.52.55.9v10z'/></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- SVG Icons (hidden) -->
  <svg style="display:none">
    <defs>
      <!-- Box/Package -->
      <symbol id="icon-box" viewBox="0 0 24 24">
        <path fill="currentColor" d="M21 16.5c0 .38-.21.72-.55.9l-7.45 3.75c-.31.15-.69.15-1 0L5.55 17.4c-.34-.18-.55-.52-.55-.9V6.5c0-.38.21-.72.55-.9l7.45-3.75c.31-.15.69-.15 1 0l7.45 3.75c.34.18.55.52.55.9v10z"/>
      </symbol>
      
      <!-- Truck -->
      <symbol id="icon-truck" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </symbol>
      
      <!-- Scan/Barcode -->
      <symbol id="icon-scan" viewBox="0 0 24 24">
        <path fill="currentColor" d="M9.5 6.5v11h-2v-11h2zm3 0v11h-2v-11h2zm3 0v11h-2v-11h2zm-9-1v1H4v-1h2.5zm0 13H4v-1h2.5v1zm13-13v1H20v-1h2.5zm0 13H20v-1h2.5v1z"/>
      </symbol>
      
      <!-- Clipboard -->
      <symbol id="icon-clipboard" viewBox="0 0 24 24">
        <path fill="currentColor" d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 16H5V5h2v3h10V5h2v14z"/>
      </symbol>
      
      <!-- Check -->
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </symbol>
      
      <!-- Clock -->
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
      </symbol>
      
      <!-- Home -->
      <symbol id="icon-home" viewBox="0 0 24 24">
        <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </symbol>
      
      <!-- User/Profile -->
      <symbol id="icon-user" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </symbol>
      
      <!-- Location -->
      <symbol id="icon-location" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </symbol>
      
      <!-- Bell -->
      <symbol id="icon-bell" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
      </symbol>
      
      <!-- Arrow right -->
      <symbol id="icon-arrow" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
      </symbol>
      
      <!-- Arrow left (back) -->
      <symbol id="icon-arrow-left" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </symbol>
      
      <!-- Sun (light theme) -->
      <symbol id="icon-sun" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
      </symbol>
      
      <!-- Moon (dark theme) -->
      <symbol id="icon-moon" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.44-.44-.07-.9-.1-1.36-.1z"/>
      </symbol>
      
      <!-- List/Orders -->
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
      </symbol>
      
      <!-- Route -->
      <symbol id="icon-route" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </symbol>
      
      <!-- Star -->
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </symbol>
      
      <!-- Target -->
      <symbol id="icon-target" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-14c2.21 0 4 1.79 4 4s-1.79 4-4 4-4-1.79-4-4 1.79-4 4-4zm0 6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
      </symbol>
      
      <!-- Speed/Gauge -->
      <symbol id="icon-gauge" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm4-8c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-8 0c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2z"/>
      </symbol>
      
      <!-- Map -->
      <symbol id="icon-map" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
      </symbol>
      
      <!-- Phone -->
      <symbol id="icon-phone" viewBox="0 0 24 24">
        <path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
      </symbol>
    </defs>
  </svg>

  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-box"/></svg>
      </div>
      <h1>AXIIOM Logistics</h1>
      <p class="tagline">Сборка и доставка заказов</p>
      <p class="desc">Управляйте сборкой заказов на складе и доставкой по маршруту — всё в одном приложении</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-box"/></svg>
          <span>Сборка заказов</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-truck"/></svg>
          <span>Доставка</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-scan"/></svg>
          <span>Сканирование</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-route"/></svg>
          <span>Маршруты</span>
        </div>
      </div>
      
      <!-- Сборщик / Курьер Toggle -->
      <div style="margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 12px;">
        <span id="pickerLabel" style="font-size: 14px; color: var(--text-muted);">Сборщик</span>
        <div onclick="toggleRole()" style="width: 56px; height: 28px; background: var(--primary); border-radius: 14px; position: relative; cursor: pointer;">
          <div id="roleToggle" style="width: 24px; height: 24px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.3s;"></div>
        </div>
        <span id="courierLabel" style="font-size: 14px; color: var(--text-muted);">Курьер</span>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Открыть демо
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">Демонстрационное приложение &bull; Работает офлайн</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <!-- Role Switcher Pill (inside phone, between phone-header and app-header) -->
      <div class="role-switcher">
        <button class="role-btn active" data-role="picker" onclick="switchRole('picker')">
          <svg class="icon-sm"><use href="#icon-box"/></svg>
          Сборщик
        </button>
        <button class="role-btn" data-role="courier" onclick="switchRole('courier')">
          <svg class="icon-sm"><use href="#icon-truck"/></svg>
          Курьер
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Главная</h2>
        <div class="header-actions">
          <button class="icon-btn" id="headerScanBtn" onclick="handleScanClick()" title="Сканировать">
            <svg class="icon"><use href="#icon-scan"/></svg>
          </button>
          <div class="profile-icon" onclick="handleProfileClick()">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('home', this)">
          <svg class="icon-nav"><use href="#icon-home"/></svg>
          <span>Главная</span>
        </button>
        <button class="nav-item picker-nav" onclick="showPage('orders', this)">
          <svg class="icon-nav"><use href="#icon-list"/></svg>
          <span>Заказы</span>
        </button>
        <button class="nav-item picker-nav" onclick="showPage('scan', this)">
          <svg class="icon-nav"><use href="#icon-scan"/></svg>
          <span>Скан</span>
        </button>
        <button class="nav-item courier-nav" style="display:none" onclick="showPage('deliveries', this)">
          <svg class="icon-nav"><use href="#icon-truck"/></svg>
          <span>Доставки</span>
        </button>
        <button class="nav-item courier-nav" style="display:none" onclick="showPage('route', this)">
          <svg class="icon-nav"><use href="#icon-route"/></svg>
          <span>Маршрут</span>
        </button>
        <button class="nav-item" onclick="showPage('profile', this)">
          <svg class="icon-nav"><use href="#icon-user"/></svg>
          <span>Профиль</span>
        </button>
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">На главную</button>
  </div>

  <script src="js/app.js"></script>
  <div style="position:fixed;top:12px;left:16px;z-index:9999;"><a href="https://axiiom.ru/demo/app/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(10,10,15,.9);color:#C7C7CC;border:1px solid rgba(255,255,255,.08);border-radius:20px;text-decoration:none;font-family:Inter,sans-serif;font-size:13px;transition:all .2s;" onmouseover="this.style.background='rgba(10,10,15,1)';this.style.color='#F5F5F7';" onmouseout="this.style.background='rgba(10,10,15,.9)';this.style.color='#C7C7CC';">← Все демо AXIIOM</a></div>
</body>
</html>
